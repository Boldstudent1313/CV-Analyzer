<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Enterprise Talent Intelligence</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>
        body { background: #0a0a0c; color: #f0f0f0; font-family: sans-serif; }
        .glass-card { background: rgba(255,255,255,0.02); border: 1px solid #2d2d30; border-radius: 20px; padding: 2.5rem; margin-top: 50px; }
        .btn-primary { background: #4f46e5; border: none; }
        .score-badge { font-size: 1.5rem; font-weight: bold; color: #10b981; }
    </style>
</head>
<body>
    <div class='container'>
        <div class='glass-card'>
            <h2 class='mb-4'>CV Analyzer Pro</h2>
            <input type='file' id='fileInput' class='form-control mb-3' accept='.pdf'>
            <textarea id='jdInput' class='form-control mb-3' rows='4' placeholder='Paste Job Requirements here...'></textarea>
            <button onclick='analyze()' class='btn btn-primary w-100'>Run Semantic Analysis</button>
            <div id='results' class='mt-4'></div>
        </div>
    </div>
    <script>
        async function analyze() {
            const file = document.getElementById('fileInput').files[0];
            const jd = document.getElementById('jdInput').value;
            if(!file || !jd) return alert('Please provide both a file and requirements');
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('requirements', jd);

            const div = document.getElementById('results');
            div.innerHTML = 'Analyzing...';

            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            div.innerHTML = `<div class='p-3 border rounded'>
                <h4>Score: <span class='score-badge'>${data.rating_out_of_10}/10</span></h4>
                <p>${data.summary}</p>
            </div>`;
        }
    </script>
</body>
</html>
